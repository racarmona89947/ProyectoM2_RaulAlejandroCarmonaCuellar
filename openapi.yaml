openapi: 3.0.3
info:
  title: API de MiniBlog
  version: 1.0.0
  description: API REST para gestionar autores y publicaciones en el proyecto MiniBlog.
servers:
  - url: /
tags:
  - name: Autores
    description: Endpoints de gestión de autores
  - name: Publicaciones
    description: Endpoints de gestión de publicaciones
paths:
  /authors:
    get:
      tags:
        - Autores
      summary: Listar autores
      responses:
        '200':
          description: Lista de autores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Autores
      summary: Crear autor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
      responses:
        '201':
          description: Autor creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /authors/{id}:
    get:
      tags:
        - Autores
      summary: Obtener autor por ID
      parameters:
        - $ref: '#/components/parameters/AuthorPathId'
      responses:
        '200':
          description: Autor encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Autores
      summary: Actualizar autor por ID
      parameters:
        - $ref: '#/components/parameters/AuthorPathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
      responses:
        '200':
          description: Autor actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Autores
      summary: Eliminar autor por ID
      parameters:
        - $ref: '#/components/parameters/AuthorPathId'
      responses:
        '204':
          description: Autor eliminado correctamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /posts:
    get:
      tags:
        - Publicaciones
      summary: Listar publicaciones
      responses:
        '200':
          description: Lista de publicaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Publicaciones
      summary: Crear publicación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '201':
          description: Publicación creada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /posts/{id}:
    get:
      tags:
        - Publicaciones
      summary: Obtener publicación por ID
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Publicación encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Publicaciones
      summary: Actualizar publicación por ID
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '200':
          description: Publicación actualizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Publicaciones
      summary: Eliminar publicación por ID
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '204':
          description: Publicación eliminada correctamente
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /posts/author/{authorId}:
    get:
      tags:
        - Publicaciones
      summary: Listar publicaciones por autor
      parameters:
        - $ref: '#/components/parameters/AuthorId'
      responses:
        '200':
          description: Lista de publicaciones filtradas por autor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  parameters:
    AuthorPathId:
      name: id
      in: path
      required: true
      description: Identificador del autor
      schema:
        type: integer
        minimum: 1
    AuthorId:
      name: authorId
      in: path
      required: true
      description: Identificador del autor usado por el endpoint de publicaciones por autor
      schema:
        type: integer
        minimum: 1
    PostId:
      name: id
      in: path
      required: true
      description: Identificador de la publicación
      schema:
        type: integer
        minimum: 1
  responses:
    BadRequest:
      description: Datos de solicitud inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Ana Torres
        email:
          type: string
          format: email
          example: ana.torres@example.com
        bio:
          type: string
          nullable: true
          example: Escritora y editora de contenido.
        created_at:
          type: string
          format: date-time
          example: '2026-07-10T12:00:00.000Z'
      required:
        - id
        - name
        - email
        - created_at
    AuthorInput:
      type: object
      properties:
        name:
          type: string
          example: Ana Torres
        email:
          type: string
          format: email
          example: ana.torres@example.com
        bio:
          type: string
          example: Escritora y editora de contenido.
      required:
        - name
        - email
    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Bienvenida al MiniBlog
        content:
          type: string
          example: Este es el primer post de ejemplo.
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: '2026-07-10T12:00:00.000Z'
      required:
        - id
        - title
        - content
        - author_id
        - published
        - created_at
    PostInput:
      type: object
      properties:
        title:
          type: string
          example: Buenas practicas en APIs REST
        content:
          type: string
          example: Un post de prueba para demostrar consultas y validaciones.
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: false
      required:
        - title
        - content
        - author_id
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Ruta no encontrada
      required:
        - message